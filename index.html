<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexy Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .box {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #0ff;
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: normal;
        }

        p {
            color: #8aa;
            font-size: 0.8rem;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a3a3a;
            display: inline-block;
            padding-bottom: 6px;
        }

        button {
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            letter-spacing: 2px;
        }

        button:hover {
            background: #0ff;
            color: #0a0c10;
        }

        .small {
            margin-top: 24px;
            font-size: 0.6rem;
            color: #3a6a6a;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>plexy bot</h1>
        <p>invited bot · discord</p>
        
        <a href="https://discord.com/api/oauth2/authorize?client_id=1488956493276643431&permissions=8&scope=bot" target="_blank">
            <button>➕ add to server</button>
        </a>
        
        <div class="small">◆ admin perms required ◆</div>
    </div>
</body>
</html>
